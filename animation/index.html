<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidType // Official Trailer</title>
    <style>
        :root {
            --red: #ff0000;
            --black: #050505;
            --glitch-filter: drop-shadow(0 0 5px var(--red));
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- STYLED START SCREEN --- */
        #start-gate {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease-in-out;
        }

        #start-gate button {
            background: none;
            border: 2px solid var(--red);
            color: var(--red);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            letter-spacing: 5px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        #start-gate button:hover {
            background: var(--red);
            color: white;
            box-shadow: 0 0 30px var(--red);
        }

        /* --- CINEMATIC VIEWPANEL --- */
        #viewport {
            display: none;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
        }

        .frame {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .active { display: flex; }

        /* --- EFFECTS --- */
        .glitch-text {
            font-size: 6rem;
            font-weight: 900;
            color: var(--red);
            text-transform: uppercase;
            animation: glitch 0.15s infinite;
            filter: var(--glitch-filter);
        }

        @keyframes glitch {
            0% { transform: translate(0); clip-path: inset(10% 0 30% 0); }
            20% { transform: translate(-5px, 2px); clip-path: inset(40% 0 10% 0); }
            40% { transform: translate(5px, -2px); }
            60% { transform: translate(-2px, 5px); }
            100% { transform: translate(0); }
        }

        .zoom-in { animation: zoomIn 0.4s ease-out forwards; }
        @keyframes zoomIn {
            from { transform: scale(3); opacity: 0; filter: blur(10px); }
            to { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .whip-pan { animation: whip 0.5s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        @keyframes whip {
            from { transform: translateX(100%) rotateY(-30deg); }
            to { transform: translateX(0) rotateY(0); }
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .background-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <audio id="chaseMusic">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="start-gate">
        <h2 style="color: #444; margin-bottom: 20px; font-weight: 100;">[ WARNING: FLASHING LIGHTS ]</h2>
        <button onclick="playTrailer()">INITIALIZE SYSTEM</button>
    </div>

    <div id="viewport">
        <div class="background-lines"></div>

        <div id="f1" class="frame">
            <h1 class="glitch-text">BREACH</h1>
        </div>

        <div id="f2" class="frame shake">
            <div style="border: 2px solid var(--red); padding: 50px;">
                <h2 style="letter-spacing: 15px;">LIQUID DASH</h2>
                <p style="color: var(--red);">STATUS: RUNNING</p>
                <div class="zoom-in" style="font-size: 5rem;">⬛</div>
            </div>
        </div>

        <div id="f3" class="frame">
            <h1 class="glitch-text" style="font-size: 3rem;">COLLECT. UPGRADE.</h1>
            <p>ALUCARD FRAGMENT CLICKER // v2.0</p>
        </div>

        <div id="f4" class="frame">
            <div class="zoom-in">
                <h1 style="font-size: 4rem; letter-spacing: -2px;">UNSTOPPABLE.</h1>
                <hr style="border: 1px solid var(--red); width: 200px;">
            </div>
        </div>

        <div id="f5" class="frame">
            <h2 style="letter-spacing: 10px; opacity: 0.7;">ENTER THE VOID</h2>
            <h1 style="color: var(--red); font-size: 2.5rem; border: 1px solid var(--red); padding: 10px 20px;">bottleliquid.github.io</h1>
        </div>
    </div>

    <script>
        const music = document.getElementById('chaseMusic');
        const gate = document.getElementById('start-gate');
        const view = document.getElementById('viewport');

        function showFrame(id) {
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function playTrailer() {
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
                view.style.display = 'block';
                
                // Audio Start
                music.currentTime = 0;
                music.play();

                // Timeline (Matches DOORS Seek Chase intensity)
                showFrame('f1'); // START
                
                setTimeout(() => showFrame('f2'), 5000);  // Bass kicks in
                setTimeout(() => showFrame('f3'), 13000); // Transition/Shift
                setTimeout(() => showFrame('f4'), 20000); // Climax
                setTimeout(() => showFrame('f5'), 26000); // Final Logo
                
                // Auto-stop at 30s
                setTimeout(() => {
                    music.pause();
                    alert("TRAILER COMPLETE. Redirecting to site...");
                    window.location.href = "https://bottleliquid.github.io";
                }, 30000);

            }, 8000); // Brief delay for cinematic tension
        }
    </script>
</body>
</html>
