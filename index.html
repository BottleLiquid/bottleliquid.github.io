body.theme-holographic{animation:holoShift 6s infinite}
@keyframes holoShift{0%{filter:hue-rotate(0deg) saturate(1.5)}50%{filter:hue-rotate(180deg) saturate(2)}100%{filter:hue-rotate(360deg) saturate(1.5)}}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;transition:background .5s}
body.theme-disco{animation:hueRot 4s infinite}
@keyframes hueRot{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

/* ── SETUP BANNER ── */
#setup-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#331100;border-bottom:2px solid #f60;padding:10px 20px;font-size:.9rem;color:#fa4;text-align:center}
#setup-banner a{color:#fd8;text-decoration:underline}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:2000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.ld-logo{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:3px;color:#cc0000}
.ld-dots{display:flex;gap:6px}
.ld-dot{width:8px;height:8px;border-radius:50%;background:#cc0000;animation:db 1s infinite}
.ld-dot:nth-child(2){animation-delay:.15s}.ld-dot:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── AUTH ── */
#auth{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1000;background:linear-gradient(135deg,#000 0%,#1a0000 60%,#000 100%)}
.abox{width:370px;background:#0f0000;border:1px solid #550000;border-radius:6px;padding:34px 30px}
.alogo{font-family:'Bebas Neue',cursive;font-size:2.8rem;letter-spacing:2px;text-align:center;color:#cc0000;margin-bottom:4px}
.atag{text-align:center;color:var(--muted);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.atabs{display:flex;border:1px solid #330000;border-radius:4px;overflow:hidden;margin-bottom:22px}
.atab{flex:1;padding:9px;border:none;background:transparent;color:#777;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:.15s}
.atab.on{background:#cc0000;color:#fff}
.field{margin-bottom:13px}
.field label{display:block;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;color:#777;margin-bottom:5px}
.field input{width:100%;padding:9px 11px;background:#0a0000;border:1px solid #440000;border-radius:4px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none}
.field input:focus{border-color:#cc0000}
.abtn{width:100%;padding:11px;background:#cc0000;border:none;border-radius:4px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px}
.abtn:hover{background:#dd0000}.abtn:disabled{opacity:.5;cursor:not-allowed}
.amsg{text-align:center;margin-top:11px;font-size:.88rem;min-height:18px}
.amsg.err{color:#f44}.amsg.ok{color:#4f8}

/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 18px;height:52px;background:#0a0000;border-bottom:1px solid #330000}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:1.55rem;letter-spacing:2px;color:#cc0000;margin-right:24px}
.nav-tabs{display:flex;gap:2px;flex:1}
.ntab{padding:6px 15px;border:none;background:transparent;color:#555;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.15s}
.ntab:hover{color:#bbb}.ntab.on{color:#ff3333;border-bottom:2px solid #cc0000}
.nav-r{display:flex;align-items:center;gap:7px;margin-left:auto}
.coins{display:flex;align-items:center;gap:4px;border:1px solid #443300;border-radius:4px;padding:3px 9px;font-weight:700;font-size:.88rem}
#coin-count{color:#ffd700}
.ubadge{background:#1a0000;border:1px solid #440000;border-radius:4px;padding:3px 9px;font-weight:600;font-size:.82rem}
.nbtn{padding:4px 10px;border-radius:4px;border:1px solid;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s;text-transform:uppercase}
.nbtn.out{background:transparent;border-color:#333;color:#666}.nbtn.out:hover{border-color:#c00;color:#c00}

.nbtn.dep{background:#001a10;border-color:#005533;color:#00aa66}.nbtn.dep:hover{background:#002a18}

/* ── TAB CONTENT ── */
.tab{display:none;padding:28px 20px;max-width:1100px;margin:0 auto}.tab.on{display:block}

/* ── RACE TAB ── */
.race-hdr{text-align:center;margin-bottom:28px}
.race-ttl{font-family:'Bebas Neue',cursive;font-size:2.3rem;letter-spacing:3px;color:#cc0000}
.race-sub{color:var(--muted);letter-spacing:2px;font-size:.85rem;margin-top:3px}
.track{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:var(--glow2);position:relative;min-height:80px}
.rrow{display:flex;align-items:center;gap:12px;margin-bottom:12px}.rrow:last-child{margin-bottom:0}
.rlabel{width:145px;font-weight:700;font-size:.85rem;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rlabel.you{color:var(--accent2)}.rlabel.bot{color:var(--muted)}.rlabel.live{color:#ffd700}
.rbar-wrap{flex:1;height:24px;background:var(--bar);border-radius:12px;overflow:hidden}
.rbar{height:100%;border-radius:12px;transition:width .25s linear;width:0%;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-size:.68rem;font-weight:700;white-space:nowrap}
.rbar.you{background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 8px rgba(200,0,0,.4)}
.rbar.bot{background:linear-gradient(90deg,rgba(100,100,100,.5),rgba(180,180,180,.5))}
.rbar.opp{background:linear-gradient(90deg,#ffd700,#ffaa00);box-shadow:0 0 8px rgba(255,180,0,.4)}
.rwpm{width:58px;text-align:right;font-size:.8rem;color:var(--muted);font-weight:600;flex-shrink:0}
.typing-area{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:24px;margin-bottom:18px}
.ptext{font-family:'JetBrains Mono',monospace;font-size:1.05rem;line-height:2;margin-bottom:18px;min-height:52px}
.ptext .ok{color:var(--ok)}.ptext .bad{color:var(--bad);background:rgba(255,23,68,.13);border-radius:2px}
.ptext .cur{border-bottom:2px solid var(--accent)}.ptext .dim{color:rgba(255,255,255,.28)}
.tinput{width:100%;padding:11px 15px;background:var(--inp);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;outline:none;caret-color:var(--accent)}
.tinput:focus{border-color:var(--accent)}.tinput:disabled{opacity:.4;cursor:not-allowed}
.rctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px}
.rbtn{padding:10px 24px;border:none;border-radius:8px;background:#cc0000;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.15s}
.rbtn:hover{background:#dd0000}.rbtn:disabled{opacity:.5;cursor:not-allowed}
.rbtn.live-btn{background:linear-gradient(135deg,#004488,#0066cc)}
.rbtn.live-btn:hover{background:linear-gradient(135deg,#005599,#0077dd)}
.stat-box{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border-radius:6px;padding:6px 12px;font-size:.88rem}
.slbl{color:var(--muted);letter-spacing:1px}.sval{font-weight:700;color:var(--accent2)}
.result-box{display:none;background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:28px;text-align:center;box-shadow:var(--glow2);margin-top:18px}
.rplace{font-family:'Bebas Neue',cursive;font-size:4.5rem;letter-spacing:4px;margin-bottom:6px}
.rplace.p1{color:#ffd700}.rplace.p2{color:#c0c0c0}.rplace.p3{color:#cd7f32}.rplace.p4{color:var(--muted)}
.rlabel2{font-size:1rem;color:var(--muted);letter-spacing:2px;margin-bottom:14px}
.rcoins{font-size:1.4rem;font-weight:700;color:#ffd700;margin-bottom:18px}
.rstats{display:flex;justify-content:center;gap:28px;margin-bottom:20px}
.rst{text-align:center}.rstv{font-size:1.8rem;font-weight:700;color:var(--accent2)}.rstl{font-size:.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
/* Countdown */
.cdown{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,.72);border-radius:14px;z-index:10}
.cdown.on{display:flex}
.cnum{font-family:'Bebas Neue',cursive;font-size:7rem;color:var(--accent);text-shadow:0 0 40px rgba(200,0,0,.8);animation:cpop .45s ease}
@keyframes cpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
/* Searching */
.searching-ui{display:none;background:rgba(0,0,100,.15);border:1px solid rgba(0,100,255,.3);border-radius:14px;padding:28px;text-align:center;margin-bottom:18px}
.searching-ui.on{display:block}
.search-title{font-family:'Bebas Neue',cursive;font-size:1.8rem;letter-spacing:3px;color:#4499ff;margin-bottom:8px}
.search-status{color:var(--muted);font-size:.95rem;margin-bottom:12px}
.search-timer{font-size:2rem;font-weight:700;color:#4499ff;margin-bottom:16px;font-family:'JetBrains Mono',monospace}
.search-matched{display:none;color:#4f8;font-size:1.1rem;font-weight:700;letter-spacing:1px}

/* ── SHOP SPLIT LAYOUT ── */
.shop-split{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
@media(max-width:900px){.shop-split{grid-template-columns:1fr}}
.shop-left{}
.depoule-panel{background:linear-gradient(180deg,rgba(40,0,0,.9),rgba(15,0,0,.95));border:1px solid rgba(200,0,0,.4);border-radius:16px;padding:22px;box-shadow:0 0 40px rgba(200,0,0,.25),inset 0 1px 0 rgba(255,100,100,.08);position:sticky;top:70px;display:flex;flex-direction:column;align-items:center;gap:14px}
.dp-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:4px;color:#ff2200;text-align:center;text-shadow:0 0 20px rgba(255,50,0,.6)}
.dp-subtitle{font-size:.7rem;color:rgba(255,100,100,.5);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:-8px}
.dp-skull{width:210px;height:210px;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 0 30px rgba(200,0,0,.5),0 0 60px rgba(200,0,0,.2);border:2px solid rgba(200,0,0,.5);transition:box-shadow .3s}
.dp-skull.rage{box-shadow:0 0 40px rgba(255,0,0,.9),0 0 80px rgba(255,0,0,.4)!important;animation:skullRage .15s infinite alternate}
@keyframes skullRage{from{transform:rotate(-1deg) scale(1.01)}to{transform:rotate(1deg) scale(1.03)}}
.dp-skull img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .3s}
.dp-skull.rage img{filter:saturate(3) brightness(1.3) contrast(1.4)}
.dp-skull::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.7));pointer-events:none}
.dp-mood{font-size:.82rem;text-align:center;font-weight:700;letter-spacing:1px;min-height:20px;transition:color .3s}
.dp-coins-earned{font-size:.78rem;color:var(--muted);text-align:center}
.dp-coins-earned span{color:#ffd700;font-weight:700}
.pet-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.pet-result{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:3px;text-align:center;min-height:32px}
.pet-result.win{color:#00e676;text-shadow:0 0 14px rgba(0,230,118,.6)}
.pet-result.lose{color:#ff2200;text-shadow:0 0 14px rgba(255,34,0,.6)}
.pet-result.jackpot{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.8);animation:jackpotPop .5s ease}
@keyframes jackpotPop{0%{transform:scale(.3) rotate(-10deg);opacity:0}60%{transform:scale(1.3) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.pet-btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:3px;cursor:pointer;transition:background .08s,box-shadow .08s,transform .08s;position:relative;overflow:hidden;user-select:none}
.pet-btn.green{background:linear-gradient(135deg,#004400,#00cc44);color:#fff;box-shadow:0 0 22px rgba(0,200,60,.5)}
.pet-btn.green:hover{background:linear-gradient(135deg,#005500,#00ee55);box-shadow:0 0 32px rgba(0,220,70,.7);transform:translateY(-2px)}
.pet-btn.red{background:linear-gradient(135deg,#440000,#dd0000);color:#fff;box-shadow:0 0 22px rgba(220,0,0,.5)}
.pet-btn.red:hover{background:linear-gradient(135deg,#550000,#ff1100);box-shadow:0 0 32px rgba(255,0,0,.7);transform:translateY(-2px)}
.pet-btn.rage-mode{animation:ragePulse .3s infinite alternate}
@keyframes ragePulse{from{box-shadow:0 0 20px rgba(255,0,0,.6);transform:scale(1)}to{box-shadow:0 0 40px rgba(255,0,0,1);transform:scale(1.02)}}
.pet-btn:active{transform:scale(.96)!important}
.pet-hint{font-size:.75rem;text-align:center;letter-spacing:1px;min-height:18px;transition:color .2s}
.pet-hint.good{color:#00e676}.pet-hint.bad{color:#ff4444}.pet-hint.neutral{color:var(--muted)}.pet-hint.jackpot-hint{color:#ffd700;font-weight:700}
.combo-bar-wrap{width:100%;height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.combo-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6600,#ffd700);border-radius:4px;transition:width .2s}
.combo-label{font-size:.7rem;color:var(--muted);text-align:center;letter-spacing:1px;margin-top:2px}
.pet-streak-row{display:flex;gap:10px;width:100%}
.pet-stat{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:9px 6px;text-align:center}
.pet-stat-val{font-family:'Bebas Neue',cursive;font-size:1.25rem;letter-spacing:1px}

@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-8px) rotate(-1deg)}20%{transform:translateX(8px) rotate(1deg)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}90%{transform:translateX(0)}}
.shaking{animation:shake .4s ease}

.mcmsg-edit-wrap{display:none;margin-top:7px;gap:6px;flex-direction:column}
.mcmsg-edit-wrap.on{display:flex}
.mc-edit-inp{width:100%;padding:6px 10px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.88rem;outline:none}
.mc-edit-inp:focus{border-color:var(--accent)}
.chat-wrap{max-width:780px;margin:0 auto}
.chat-ttl{font-family:'Bebas Neue',cursive;font-size:2.3rem;letter-spacing:3px;color:var(--accent2);text-align:center;margin-bottom:22px}
.chatbox{background:var(--card);border:1px solid var(--cb);border-radius:14px;overflow:hidden;box-shadow:var(--glow2)}
.msgs{height:460px;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px}
.msgs::-webkit-scrollbar{width:5px}.msgs::-webkit-scrollbar-thumb{background:rgba(200,0,0,.3);border-radius:3px}
.cmsg{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);animation:min .2s ease}
@keyframes min{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.cavatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#800000);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;text-transform:uppercase}
.cbody{flex:1}.chdr{display:flex;align-items:baseline;gap:7px;margin-bottom:2px}
.cuser{font-weight:700;font-size:.88rem;color:var(--accent2)}.ctime{font-size:.72rem;color:var(--muted)}
.ctext{font-size:.92rem;line-height:1.5;word-break:break-word}
.chat-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;gap:9px}
.cinput{flex:1;padding:11px 14px;background:var(--inp);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none}
.cinput:focus{border-color:var(--accent)}
.csend{padding:11px 22px;border:none;border-radius:9px;background:#cc0000;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.csend:hover{background:#dd0000}

/* ── LEADERBOARD ── */
.lbtable{width:100%;border-collapse:collapse}
.lbtable th{text-align:left;padding:9px 11px;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.07)}
.lbtable td{padding:11px;font-size:.92rem;border-bottom:1px solid rgba(255,255,255,.04)}
.lbrank{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--muted)}
.lbrank.r1{color:#ffd700}.lbrank.r2{color:#c0c0c0}.lbrank.r3{color:#cd7f32}
.lbname{font-weight:700}.lbcoins{color:#ffd700;font-weight:700}

/* ── MODALS ── */
.moverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:18px}
.moverlay.on{display:flex}
.modal{background:#0a0000;border:1px solid rgba(200,0,0,.4);border-radius:14px;padding:28px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(200,0,0,.2);animation:mshow .22s ease}
.modal.dp{border-color:rgba(0,200,150,.4);box-shadow:0 0 60px rgba(0,200,150,.15)}
@keyframes mshow{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mttl{font-family:'Bebas Neue',cursive;font-size:1.9rem;letter-spacing:3px;margin-bottom:5px;color:var(--accent2)}
.modal.dp .mttl{color:#00c896}
.msub{color:var(--muted);font-size:.82rem;letter-spacing:2px;margin-bottom:22px}
.mpw{display:flex;gap:9px;margin-bottom:22px}
.mpw input{flex:1;padding:11px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none}
.mpw input:focus{border-color:var(--accent)}
.munlock{padding:11px 18px;border:none;border-radius:7px;background:#cc7700;color:#000;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.munlock:hover{background:#dd8800}.munlock.dp{background:#00c896;color:#fff}
.mlocked{text-align:center;padding:18px}
.mulocked{display:none}.mulocked.on{display:block}
.msec{margin-bottom:26px}
.msec-ttl{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:2px;color:#ffa500;margin-bottom:10px;border-bottom:1px solid rgba(255,165,0,.2);padding-bottom:5px}
.msec-ttl.dp{color:#00c896;border-color:rgba(0,200,150,.2)}
.atable{width:100%;border-collapse:collapse}
.atable th{text-align:left;padding:7px 9px;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.07)}
.atable td{padding:9px;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.atable tr:hover td{background:rgba(255,255,255,.03)}
.tdpass{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#f98}
.tdcoins{color:#ffd700;font-weight:700}
.tdact{display:flex;gap:5px;flex-wrap:wrap}
.bsm{padding:4px 9px;border-radius:5px;border:none;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer}
.bsm.give{background:rgba(0,230,118,.2);color:#00e676;border:1px solid rgba(0,230,118,.3)}.bsm.give:hover{background:rgba(0,230,118,.35)}
.bsm.take{background:rgba(255,165,0,.2);color:#ffa500;border:1px solid rgba(255,165,0,.3)}.bsm.take:hover{background:rgba(255,165,0,.35)}
.bsm.del,.bsm.rm{background:rgba(255,0,0,.15);color:#f44;border:1px solid rgba(255,0,0,.25)}.bsm.del:hover,.bsm.rm:hover{background:rgba(255,0,0,.3)}
.bsm.edit{background:rgba(100,150,255,.15);color:#88aaff;border:1px solid rgba(100,150,255,.25)}.bsm.edit:hover{background:rgba(100,150,255,.3)}
.coinamt{width:55px;padding:4px 7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:5px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:.82rem;text-align:center;outline:none}
.mcmsg{display:flex;align-items:center;gap:9px;padding:7px;border-bottom:1px solid rgba(255,255,255,.04)}
.mcmsg-txt{flex:1;font-size:.85rem}
.mcuser{font-weight:700;color:var(--accent2);margin-right:5px}
.mbtnclose{margin-top:7px;padding:9px 22px;border:none;border-radius:7px;background:rgba(255,255,255,.08);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;float:right}
.mbtnclose:hover{background:rgba(255,255,255,.14);color:var(--text)}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:.88rem}
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:rgba(15,0,0,.97);border:1px solid var(--accent);border-radius:9px;padding:13px 18px;font-weight:600;font-size:.88rem;letter-spacing:1px;box-shadow:var(--glow);animation:tin .3s ease;pointer-events:none}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-panel{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:22px;box-shadow:var(--glow2)}

/* ── PROFILE MODAL ── */
.modal.profile{max-width:420px;border-color:rgba(200,0,0,.35)}
.prof-top{display:flex;align-items:center;gap:18px;margin-bottom:24px}
.prof-avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#800000);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:2rem;flex-shrink:0;border:2px solid rgba(200,0,0,.4);box-shadow:var(--glow)}
.prof-info{flex:1}
.prof-name{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:2px;color:var(--text);line-height:1}
.prof-badge{display:inline-block;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:3px;margin-top:5px;background:rgba(200,0,0,.15);border:1px solid rgba(200,0,0,.3);color:var(--accent2)}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
.prof-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:13px 10px;text-align:center}
.prof-stat-val{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:1px}
.prof-stat-val.gold{color:#ffd700}
.prof-stat-val.fire{color:#ff6600}
.prof-stat-val.blue{color:var(--accent2)}
.prof-stat-lbl{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.prof-theme-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.prof-theme-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}
.prof-theme-lbl{font-size:.78rem;color:var(--muted);letter-spacing:1px}
.prof-actions{display:flex;gap:9px;flex-direction:column}
.gift-row{display:flex;gap:8px;align-items:center}
.gift-input{flex:1;padding:10px 12px;background:var(--inp);border:1px solid #440000;border-radius:7px;color:#ffd700;font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;outline:none;text-align:center}
.gift-input:focus{border-color:#ffd700}
.gift-btn{padding:10px 20px;border:none;border-radius:7px;background:linear-gradient(135deg,#cc7700,#ffaa00);color:#000;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap}
.gift-btn:hover{background:linear-gradient(135deg,#dd8800,#ffbb00)}
.gift-btn:disabled{opacity:.4;cursor:not-allowed}
.prof-self-note{text-align:center;color:var(--muted);font-size:.82rem;padding:8px;font-style:italic}
.cuser{cursor:pointer;transition:color .15s}.cuser:hover{color:#fff;text-decoration:underline}

/* ── TRADE ── */
.trade-wrap{max-width:900px;margin:0 auto}
.trade-hdr{text-align:center;margin-bottom:28px}
.trade-ttl{font-family:'Bebas Neue',cursive;font-size:2.6rem;letter-spacing:4px;color:var(--accent2)}
.trade-sub{color:var(--muted);font-size:.82rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.trade-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.trade-layout{grid-template-columns:1fr}}
.trade-panel{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:22px;box-shadow:var(--glow2)}
.trade-panel-title{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:2px;color:var(--accent2);margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:8px}
.trade-form-row{margin-bottom:14px}
.trade-form-row label{display:block;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.trade-input{width:100%;padding:9px 12px;background:var(--inp);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none}
.trade-input:focus{border-color:var(--accent)}
.trade-input[type=number]{color:#ffd700;font-family:'JetBrains Mono',monospace;font-weight:700}
.theme-pick-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.theme-pick-chip{padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;user-select:none}
.theme-pick-chip.selected{border-color:var(--accent);background:rgba(200,0,0,.2);color:var(--accent2)}
.trade-offer-preview{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px;margin-bottom:14px;font-size:.85rem;color:var(--muted);min-height:48px}
.trade-offer-preview b{color:var(--text)}
.btn-send-trade{width:100%;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,#cc0000,#880000);color:#fff;font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:2px;cursor:pointer;transition:.15s}
.btn-send-trade:hover{background:linear-gradient(135deg,#dd0000,#aa0000);box-shadow:var(--glow)}
.btn-send-trade:disabled{opacity:.4;cursor:not-allowed}
.trade-list{display:flex;flex-direction:column;gap:10px}
.trade-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;animation:msgIn .2s ease}
.trade-item.incoming{border-color:rgba(0,200,80,.25);background:rgba(0,200,80,.04)}
.trade-item.outgoing{border-color:rgba(100,150,255,.2);background:rgba(100,150,255,.03)}
.trade-item.done{opacity:.5;border-color:rgba(255,255,255,.05)}
.trade-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.trade-from{font-weight:700;font-size:.9rem;color:var(--accent2)}
.trade-status-badge{font-size:.68rem;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.trade-status-badge.pending{background:rgba(255,200,0,.15);color:#ffd700;border:1px solid rgba(255,200,0,.3)}
.trade-status-badge.accepted{background:rgba(0,230,80,.15);color:#00e676;border:1px solid rgba(0,230,80,.3)}
.trade-status-badge.declined{background:rgba(255,50,50,.12);color:#ff6666;border:1px solid rgba(255,50,50,.2)}
.trade-status-badge.cancelled{background:rgba(150,150,150,.1);color:#888;border:1px solid rgba(150,150,150,.2)}
.trade-details{font-size:.82rem;color:var(--muted);margin-bottom:10px;line-height:1.6}
.trade-details b{color:var(--text)}
.trade-actions{display:flex;gap:7px}
.btn-accept{padding:7px 16px;border:none;border-radius:7px;background:rgba(0,200,80,.2);color:#00e676;border:1px solid rgba(0,200,80,.35);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-accept:hover{background:rgba(0,200,80,.35)}
.btn-decline{padding:7px 16px;border:none;border-radius:7px;background:rgba(255,50,50,.12);color:#ff6666;border:1px solid rgba(255,50,50,.25);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-decline:hover{background:rgba(255,50,50,.25)}
.btn-cancel-trade{padding:7px 16px;border:none;border-radius:7px;background:rgba(150,150,150,.1);color:#888;border:1px solid rgba(150,150,150,.2);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-cancel-trade:hover{background:rgba(150,150,150,.2);color:#aaa}
.trade-notif{display:none;position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;background:#ff2200;border:2px solid #0a0000;animation:notifPulse 1.5s infinite}
.trade-notif.on{display:block}
@keyframes notifPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.ntab-wrap{position:relative;display:inline-block}

<body class="theme-default">

// ── SESSION ────────────────────────────────────────────
function getU() { return localStorage.getItem('lt_u') || null; }
function setU(u) { u ? localStorage.setItem('lt_u',u) : localStorage.removeItem('lt_u'); }

// ── DATA LAYER ─────────────────────────────────────────
async function dbGetUser(u) {
  if (FB_READY) { const d=await db.collection('users').doc(u).get(); return d.exists?d.data():null; }
  return (JSON.parse(localStorage.getItem('lt_accs')||'[]')).find(a=>a.username===u)||null;
}
async function dbAllUsers() {
  if (FB_READY) { const s=await db.collection('users').get(); return s.docs.map(d=>d.data()); }
  return JSON.parse(localStorage.getItem('lt_accs')||'[]');
}
async function dbCreateUser(data) {
  if (FB_READY) { await db.collection('users').doc(data.username).set(data); return; }
  const a=JSON.parse(localStorage.getItem('lt_accs')||'[]'); a.push(data); localStorage.setItem('lt_accs',JSON.stringify(a));
}
async function dbUpdateUser(u, ch) {
  if (FB_READY) { await db.collection('users').doc(u).update(ch); }
  else { const a=JSON.parse(localStorage.getItem('lt_accs')||'[]'),i=a.findIndex(x=>x.username===u); if(i>=0){Object.assign(a[i],ch);localStorage.setItem('lt_accs',JSON.stringify(a));} }
  if (u===getU()&&UC) Object.assign(UC,ch);
}
async function dbDeleteUser(u) {
  if (FB_READY) { await db.collection('users').doc(u).delete(); return; }
  const a=JSON.parse(localStorage.getItem('lt_accs')||'[]').filter(x=>x.username!==u); localStorage.setItem('lt_accs',JSON.stringify(a));
}

// chat
let chatCache=[], chatUnsub=null;
function startChatListener() {
  if (chatUnsub) try{chatUnsub();}catch(e){clearInterval(chatUnsub);}
  if (FB_READY) {
    chatUnsub = db.collection('messages').orderBy('ts').limitToLast(150).onSnapshot(s=>{
      chatCache=s.docs.map(d=>d.data()); renderChat();
      if(admOpen)renderAdmChat(); if(dpOpen)renderDPChat();
    });
  } else {
    const poll=()=>{chatCache=JSON.parse(localStorage.getItem('lt_chat')||'[]');renderChat();};
    poll(); chatUnsub=setInterval(poll,2500);
  }
}
async function dbAddMsg(m) {
  if (FB_READY) { await db.collection('messages').doc(m.id).set(m); return; }
  const c=JSON.parse(localStorage.getItem('lt_chat')||'[]'); c.push(m); if(c.length>200)c.splice(0,c.length-200); localStorage.setItem('lt_chat',JSON.stringify(c)); chatCache=c; renderChat();
}
async function dbDelMsg(id) {
  if (FB_READY) { await db.collection('messages').doc(id).delete(); return; }
  chatCache=chatCache.filter(m=>m.id!==id); localStorage.setItem('lt_chat',JSON.stringify(chatCache)); renderChat(); if(admOpen)renderAdmChat(); if(dpOpen)renderDPChat();
}
async function dbEditMsg(id, newText) {
  if (FB_READY) { await db.collection('messages').doc(id).update({text:newText,edited:true}); return; }
  const m=chatCache.find(x=>x.id===id); if(m){m.text=newText;m.edited=true;} localStorage.setItem('lt_chat',JSON.stringify(chatCache)); renderChat(); if(admOpen)renderAdmChat(); if(dpOpen)renderDPChat();
}

// ── STREAK HELPER ─────────────────────────────────────
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function calcStreak(acc){
  const today=todayStr(), yesterday=yesterdayStr();
  const last=acc.lastLoginDate||'';
  if(last===today) return {streak:acc.streak||1,lastLoginDate:today};
  if(last===yesterday) return {streak:(acc.streak||0)+1,lastLoginDate:today};
  return {streak:1,lastLoginDate:today};
}

  document.getElementById('tab-li').classList.toggle('on',tab==='login');

  document.getElementById('re-form').style.display=tab==='register'?'':'none';

async function doLogin() {
  const u=document.getElementById('li-u').value.trim(), p=document.getElementById('li-p').value;
  const msg=document.getElementById('li-msg'), btn=document.getElementById('li-btn');
  if(!u||!p){msg.className='amsg err';msg.textContent='Fill in all fields.';return;}
  btn.disabled=true; btn.textContent='Checking…';
  const acc=await dbGetUser(u);
  if(!acc||acc.password!==p){msg.className='amsg err';msg.textContent='Wrong username or password.';btn.disabled=false;btn.textContent='Enter The Race';return;}
  const streakData=calcStreak(acc);
  await dbUpdateUser(u,streakData);
  UC={...acc,...streakData}; setU(u); msg.className='amsg ok'; msg.textContent='Welcome back!'; setTimeout(enterApp,300);
}
async function doRegister() {
  const u=document.getElementById('re-u').value.trim(), p=document.getElementById('re-p').value;
  const msg=document.getElementById('re-msg'), btn=document.getElementById('re-btn');
  if(!u||!p){msg.className='amsg err';msg.textContent='Fill in all fields.';return;}

  if(p.length<4){msg.className='amsg err';msg.textContent='Password must be 4+ chars.';return;}
  btn.disabled=true; btn.textContent='Checking…';
  if(await dbGetUser(u)){msg.className='amsg err';msg.textContent='Username taken.';btn.disabled=false;btn.textContent='Create Account';return;}
  const acc={username:u,password:p,coins:100,themes:['default'],activeTheme:'default',gradientColors:null,streak:1,lastLoginDate:todayStr()};
  await dbCreateUser(acc); UC={...acc}; setU(u); msg.className='amsg ok'; msg.textContent='Account created!'; setTimeout(enterApp,300);
}
function doLogout() {
  setU(null); UC=null; liveCleanup();
  if(chatUnsub)try{chatUnsub();}catch(e){clearInterval(chatUnsub);}chatUnsub=null;
  if(tradeUnsub)try{tradeUnsub();}catch(e){}tradeUnsub=null;

  document.getElementById('auth').style.display='flex';

  document.getElementById('re-btn').disabled=false; document.getElementById('re-btn').textContent='Create Account';
  document.getElementById('li-msg').textContent='';
  resetRace(); applyTheme('default',null);
}
function enterApp() {
  document.getElementById('auth').style.display='none';

// ── SOLO RACE ENGINE ────────────────────────────────────
const PROMPTS=[
  "The quick brown fox jumps over the lazy dog near the river bank.",
  "Typing fast is a skill that takes practice and dedication every single day.",
  "Liquid flows freely through every crack and crevice with unstoppable momentum.",
  "Speed is nothing without accuracy so always focus on correct keystrokes.",
  "The stars burned bright against the endless dark canvas of the midnight sky.",
  "Every great journey begins with a single keystroke on the path to mastery.",
  "Rain fell silently on the cobblestone streets as the city lights shimmered below.",
  "Champions are made in the moments when they want to quit but push through anyway.",
  "Technology shapes the future and those who type fast shape technology itself.",
  "The wind whispered through the ancient trees carrying secrets of forgotten worlds.",
  "Persistence is the hidden engine beneath every great achievement in history.",
  "Silence filled the room as fingers danced across the illuminated keyboard tonight."
];
const BOT_NAMES=['Ytggobs','TheFinnyShow','Doodlehoney2018','Marco'];
const COIN_REWARDS=[50,30,15,5];
const PLABELS=['1ST','2ND','3RD','4TH'];
const PCSS=['p1','p2','p3','p4'];

let RS={active:false,prompt:'',typed:'',startTime:null,endTime:null,bots:[],botIvs:[],timerIv:null,finished:false,finishOrder:[],errors:0,mode:'solo'};
let lastLen=0;

function startSolo() {
  if(RS.active||liveRS.searching||liveRS.active)return;
  RS={active:false,prompt:PROMPTS[Math.floor(Math.random()*PROMPTS.length)],typed:'',startTime:null,endTime:null,
    bots:BOT_NAMES.map(n=>({name:n,wpm:Math.floor(Math.random()*36)+45,progress:0,finished:false,finishTime:null,expectedMs:0})),
    botIvs:[],timerIv:null,finished:false,finishOrder:[],errors:0,mode:'solo'};
  const wc=RS.prompt.trim().split(/\s+/).length;
  RS.bots.forEach(b=>b.expectedMs=(wc/b.wpm)*60000);
  renderPromptText(); renderRacers('solo');
  document.getElementById('result-box').style.display='none';
  document.getElementById('btn-solo').style.display='none';
  document.getElementById('btn-live').style.display='none';
  resetStats();
  countdown(()=>beginSolo());
}

function beginSolo() {
  RS.active=true; RS.startTime=Date.now();
  const inp=document.getElementById('tinput');
  inp.disabled=false; inp.value=''; lastLen=0; inp.focus();
  RS.botIvs=RS.bots.map((b,i)=>setInterval(()=>{
    if(!RS.active||b.finished)return;
    const elapsed=Date.now()-RS.startTime;
    b.progress=Math.min(1,elapsed/b.expectedMs);
    const pct=Math.round(b.progress*100);
    const bar=document.getElementById('bar-bot-'+i);
    if(bar){bar.style.width=pct+'%';const lbl=document.getElementById('bpct-'+i);if(lbl)lbl.textContent=pct+'%';}
    document.getElementById('bwpm-'+i).textContent=b.wpm+' wpm';
    if(b.progress>=1&&!b.finished){
      b.finished=true; b.finishTime=Date.now();
      RS.finishOrder.push({type:'bot',name:b.name,time:b.finishTime});
    }
  },100));
  RS.timerIv=setInterval(()=>{
    if(!RS.active)return;
    const e=(Date.now()-RS.startTime);
    document.getElementById('s-time').textContent=(e/1000).toFixed(1)+'s';
    const em=e/60000, words=RS.typed.trim().split(/\s+/).filter(Boolean).length;
    const wpm=em>0?Math.round(words/em):0;
    document.getElementById('s-wpm').textContent=wpm;
    document.getElementById('pwpm-you').textContent=wpm+' wpm';
  },200);
}

async function soloFinished() {
  RS.active=false; RS.finished=true; RS.endTime=Date.now();
  document.getElementById('tinput').disabled=true;
  RS.botIvs.forEach(id=>clearInterval(id)); clearInterval(RS.timerIv);
  RS.finishOrder.push({type:'player',time:RS.endTime});
  RS.bots.forEach((b,i)=>{
    if(!b.finished){
      // Bot hadn't finished yet — it finishes AFTER player
      b.finished=true;
      b.finishTime=RS.endTime+Math.floor(Math.random()*6000)+500;
      RS.finishOrder.push({type:'bot',name:b.name,time:b.finishTime});
      // Animate remaining bots to 100%
      const bar=document.getElementById('bar-bot-'+i);
      if(bar){bar.style.width='100%';const l=document.getElementById('bpct-'+i);if(l)l.textContent='100%';}
    }
  });
  RS.finishOrder.sort((a,b)=>a.time-b.time);
  const place=RS.finishOrder.findIndex(f=>f.type==='player')+1;
  const elapsed=RS.endTime-RS.startTime;
  const wpm=Math.round(RS.prompt.trim().split(/\s+/).length/(elapsed/60000));
  const acc=Math.max(0,Math.round(((RS.prompt.length-RS.errors)/RS.prompt.length)*100));
  const coins=COIN_REWARDS[Math.min(place-1,3)];
  if(UC){UC.coins=(UC.coins||0)+coins;await dbUpdateUser(getU(),{coins:UC.coins});refreshCoins();}
  showResult(place,coins,wpm,acc,elapsed);
}

function showResult(place,coins,wpm,acc,elapsed) {
  const el=document.getElementById('r-place');
  el.textContent=PLABELS[Math.min(place-1,3)]; el.className='rplace '+PCSS[Math.min(place-1,3)];
  document.getElementById('r-coins').textContent='+'+coins+' 🪙';
  document.getElementById('r-wpm').textContent=wpm;
  document.getElementById('r-acc').textContent=acc+'%';
  document.getElementById('r-time').textContent=(elapsed/1000).toFixed(1)+'s';
  document.getElementById('result-box').style.display='block';
  document.getElementById('btn-solo').style.display='';
  document.getElementById('btn-live').style.display='';
}

function resetRace() {
  RS.active=false; RS.finished=false;
  RS.botIvs.forEach(id=>clearInterval(id)); clearInterval(RS.timerIv);
  liveCleanup();
  document.getElementById('tinput').disabled=true; document.getElementById('tinput').value='';
  document.getElementById('ptext').innerHTML='<span style="color:var(--muted);font-size:.88rem">Press Start Race to begin…</span>';
  document.getElementById('result-box').style.display='none';
  document.getElementById('racers').innerHTML='';
  document.getElementById('searching-ui').classList.remove('on');
  document.getElementById('btn-solo').style.display='';
  document.getElementById('btn-live').style.display='';
  resetStats();
}

function resetStats(){document.getElementById('s-wpm').textContent='0';document.getElementById('s-acc').textContent='100%';document.getElementById('s-time').textContent='0s';}

function countdown(cb) {
  let n=3; const ov=document.getElementById('cdown'), el=document.getElementById('cnum');
  ov.classList.add('on'); el.textContent=n; el.style.color='';
  const iv=setInterval(()=>{
    n--;
    if(n>0){el.style.animation='none';void el.offsetWidth;el.style.animation='cpop .45s ease';el.textContent=n;}
    else if(n===0){el.textContent='GO!';el.style.color='#00e676';}
    else{clearInterval(iv);ov.classList.remove('on');cb();}
  },700);
}

function renderRacers(mode) {
  const el=document.getElementById('racers'); el.innerHTML='';
  el.innerHTML+=`<div class="rrow"><div class="rlabel you">YOU</div><div class="rbar-wrap"><div class="rbar you" id="bar-you" style="width:0%"><span id="pct-you">0%</span></div></div><div class="rwpm" id="pwpm-you">0 wpm</div></div>`;
  if(mode==='solo'){
    RS.bots.forEach((b,i)=>{ el.innerHTML+=`<div class="rrow"><div class="rlabel bot">${esc(b.name)}</div><div class="rbar-wrap"><div class="rbar bot" id="bar-bot-${i}" style="width:0%"><span id="bpct-${i}">0%</span></div></div><div class="rwpm" id="bwpm-${i}">0 wpm</div></div>`; });
  } else if(mode==='live') {
    el.innerHTML+=`<div class="rrow"><div class="rlabel live" id="opp-label">Opponent</div><div class="rbar-wrap"><div class="rbar opp" id="bar-opp" style="width:0%"><span id="pct-opp">0%</span></div></div><div class="rwpm" id="pwpm-opp">0 wpm</div></div>`;
  }
}

function renderPromptText() {
  const el=document.getElementById('ptext'), typed=RS.typed, prompt=RS.prompt; let html='';
  for(let i=0;i<prompt.length;i++){
    if(i<typed.length) html+=typed[i]===prompt[i]?`<span class="ok">${esc(prompt[i])}</span>`:`<span class="bad">${esc(prompt[i])}</span>`;
    else if(i===typed.length) html+=`<span class="cur">${esc(prompt[i])}</span>`;
    else html+=`<span class="dim">${esc(prompt[i])}</span>`;
  }
  el.innerHTML=html;
}

// Input listener
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('tinput');
  inp.addEventListener('paste',e=>e.preventDefault());
  inp.addEventListener('drop',e=>e.preventDefault());
  inp.addEventListener('input',e=>{
    if((!RS.active&&!liveRS.active)||RS.finished)return;
    const val=e.target.value, prompt=RS.prompt;
    if(val.length>lastLen+1){e.target.value=val.slice(0,lastLen+1);lastLen=e.target.value.length;return;}
    lastLen=val.length;
    let errs=0; for(let i=0;i<val.length;i++){if(i>=prompt.length||val[i]!==prompt[i])errs++;}
    RS.errors=errs;
    document.getElementById('s-acc').textContent=Math.max(0,val.length?Math.round(((val.length-errs)/val.length)*100):100)+'%';
    RS.typed=val; renderPromptText();
    const pct=Math.min(100,Math.round((val.length/prompt.length)*100));
    const bar=document.getElementById('bar-you');
    if(bar){bar.style.width=pct+'%';document.getElementById('pct-you').textContent=pct+'%';}
    if(val===prompt){
      if(RS.mode==='solo') soloFinished();
      else liveFinished();
    }
  });
});

// ── LIVE RACE ENGINE ────────────────────────────────────
let liveRS={searching:false,active:false,lobbyId:null,role:null,prompt:'',startTime:null,finished:false,opUser:null,lobbyUnsub:null,searchTimer:null,searchElapsed:0,searchDisplayIv:null,progressIv:null};

function startLiveSearch() {
  if(RS.active||liveRS.searching||liveRS.active)return;
  if(!FB_READY){showToast('Live Race requires Firebase to be configured!');return;}
  liveRS.searching=true; liveRS.searchElapsed=0;
  document.getElementById('searching-ui').classList.add('on');
  document.getElementById('btn-solo').style.display='none';
  document.getElementById('btn-live').style.display='none';
  document.getElementById('search-status').textContent='Searching for opponents…';
  document.getElementById('search-matched').style.display='none';
  document.getElementById('search-timer').textContent='0s';
  liveRS.searchDisplayIv=setInterval(()=>{
    liveRS.searchElapsed++;
    document.getElementById('search-timer').textContent=liveRS.searchElapsed+'s';
  },1000);
  liveRS.searchTimer=setTimeout(()=>cancelLiveSearch('No opponents found. Try again!'),60000);
  findOrCreateLobby();
}

async function findOrCreateLobby() {
  try {
    // Look for an open lobby (not hosted by this user, created within last 70s)
    const cutoff=Date.now()-70000;
    const snap=await db.collection('lobbies').where('status','==','waiting').where('host','!=',getU()).orderBy('host').orderBy('createdAt').get();
    const fresh=snap.docs.filter(d=>d.data().createdAt>cutoff);
    if(fresh.length>0) {
      // Join existing lobby
      const lobbyDoc=fresh[0]; const startAt=Date.now()+4000;
      await db.collection('lobbies').doc(lobbyDoc.id).update({guest:getU(),status:'racing',startAt});
      liveRS.lobbyId=lobbyDoc.id; liveRS.role='guest'; liveRS.opUser=lobbyDoc.data().host;
      listenLobby(lobbyDoc.id);
    } else {
      // Create new lobby
      const prompt=PROMPTS[Math.floor(Math.random()*PROMPTS.length)];
      const ref=db.collection('lobbies').doc();
      await ref.set({id:ref.id,host:getU(),hostPct:0,hostWpm:0,hostDone:false,hostTime:null,guest:null,guestPct:0,guestWpm:0,guestDone:false,guestTime:null,prompt,status:'waiting',startAt:null,createdAt:Date.now()});
      liveRS.lobbyId=ref.id; liveRS.role='host';
      listenLobby(ref.id);
    }
  } catch(e) { console.error('Lobby error:',e); cancelLiveSearch('Connection error. Try again.'); }
}

function listenLobby(id) {
  if(liveRS.lobbyUnsub) liveRS.lobbyUnsub();
  liveRS.lobbyUnsub=db.collection('lobbies').doc(id).onSnapshot(doc=>{
    if(!doc.exists){cancelLiveSearch('Lobby expired.');return;}
    handleLobbySnap(doc.data());
  });
}

let liveStarted=false;
function handleLobbySnap(lobby) {
  if(lobby.status==='racing'&&!liveStarted&&liveRS.searching) {
    // Opponent found / race starting
    liveStarted=true;
    liveRS.opUser=liveRS.role==='host'?lobby.guest:lobby.host;
    liveRS.prompt=lobby.prompt; RS.prompt=lobby.prompt; RS.mode='live';
    document.getElementById('search-status').textContent='Opponent found: '+liveRS.opUser+'!';
    document.getElementById('search-matched').style.display='block';
    document.getElementById('search-matched').textContent='🎮 '+liveRS.opUser+' joined — race starting!';
    clearInterval(liveRS.searchDisplayIv); clearTimeout(liveRS.searchTimer);
    const now=Date.now(), delay=lobby.startAt-now;
    renderRacers('live'); document.getElementById('opp-label').textContent=liveRS.opUser;
    renderPromptText();
    setTimeout(()=>{
      document.getElementById('searching-ui').classList.remove('on');
      countdown(()=>beginLive(lobby));
    }, Math.max(0,delay-3000));
  } else if(lobby.status==='racing'&&liveRS.active) {
    // Update opponent bar
    const myRole=liveRS.role, opRole=myRole==='host'?'guest':'host';
    const opPct=lobby[opRole+'Pct']||0, opWpm=lobby[opRole+'Wpm']||0;
    const bar=document.getElementById('bar-opp');
    if(bar){bar.style.width=opPct+'%';document.getElementById('pct-opp').textContent=opPct+'%';}
    document.getElementById('pwpm-opp').textContent=opWpm+' wpm';
    // Check if opponent finished
    if(lobby[opRole+'Done']&&!RS.finished) {
      // Opponent beat us — end our race
      setTimeout(()=>{ if(!RS.finished) liveFinished(true); },500);
    }
  }
}

function beginLive(lobby) {
  liveRS.searching=false; liveRS.active=true;
  RS.active=true; RS.typed=''; RS.errors=0; RS.startTime=Date.now(); RS.finished=false;
  const inp=document.getElementById('tinput'); inp.disabled=false; inp.value=''; lastLen=0; inp.focus();
  // Push progress updates
  liveRS.progressIv=setInterval(async()=>{
    if(!liveRS.active||RS.finished)return;
    const myRole=liveRS.role, elapsed=(Date.now()-RS.startTime)/60000;
    const words=RS.typed.trim().split(/\s+/).filter(Boolean).length;
    const wpm=elapsed>0?Math.round(words/elapsed):0;
    const pct=Math.min(100,Math.round((RS.typed.length/RS.prompt.length)*100));
    try { await db.collection('lobbies').doc(liveRS.lobbyId).update({[myRole+'Pct']:pct,[myRole+'Wpm']:wpm}); } catch(e){}
  },800);
  RS.timerIv=setInterval(()=>{
    if(!RS.active)return;
    const e=Date.now()-RS.startTime;
    document.getElementById('s-time').textContent=(e/1000).toFixed(1)+'s';
    const em=e/60000, words=RS.typed.trim().split(/\s+/).filter(Boolean).length;
    const wpm=em>0?Math.round(words/em):0;
    document.getElementById('s-wpm').textContent=wpm;
    document.getElementById('pwpm-you').textContent=wpm+' wpm';
  },200);
}

async function liveFinished(opponentWon=false) {
  if(RS.finished)return;
  RS.active=false; RS.finished=true; liveRS.active=false;
  RS.endTime=Date.now(); clearInterval(RS.timerIv); clearInterval(liveRS.progressIv);
  document.getElementById('tinput').disabled=true;
  const myRole=liveRS.role;
  const elapsed=RS.endTime-RS.startTime;
  const wpm=Math.round(RS.prompt.trim().split(/\s+/).length/(elapsed/60000));
  const acc=Math.max(0,Math.round(((RS.prompt.length-RS.errors)/RS.prompt.length)*100));
  try { await db.collection('lobbies').doc(liveRS.lobbyId).update({[myRole+'Done']:true,[myRole+'Time']:RS.endTime}); } catch(e){}
  const place=opponentWon?2:1;
  const coins=place===1?75:20;
  if(UC){UC.coins=(UC.coins||0)+coins;await dbUpdateUser(getU(),{coins:UC.coins});refreshCoins();}
  showResult(place,coins,wpm,acc,elapsed);
  setTimeout(()=>{ try{db.collection('lobbies').doc(liveRS.lobbyId).update({status:'done'});}catch(e){} },500);
  liveRSreset();
}

function liveRSreset() {
  liveStarted=false;
  if(liveRS.lobbyUnsub){liveRS.lobbyUnsub();liveRS.lobbyUnsub=null;}
  clearInterval(liveRS.progressIv); clearInterval(liveRS.searchDisplayIv); clearTimeout(liveRS.searchTimer);
  liveRS={searching:false,active:false,lobbyId:null,role:null,prompt:'',startTime:null,finished:false,opUser:null,lobbyUnsub:null,searchTimer:null,searchElapsed:0,searchDisplayIv:null,progressIv:null};
}

function cancelLiveSearch(msg='Search cancelled.') {
  // Delete lobby if we created it
  if(liveRS.lobbyId&&liveRS.role==='host'){try{db.collection('lobbies').doc(liveRS.lobbyId).delete();}catch(e){}}
  liveRSreset(); RS.mode='solo';
  document.getElementById('searching-ui').classList.remove('on');
  document.getElementById('btn-solo').style.display='';
  document.getElementById('btn-live').style.display='';
  document.getElementById('racers').innerHTML='';
  showToast(msg);
}

function liveCleanup() {
  if(liveRS.lobbyId&&liveRS.role==='host'&&liveRS.searching){try{db.collection('lobbies').doc(liveRS.lobbyId).delete();}catch(e){}}
  liveRSreset();
}

async function sendTradeOffer(){

  const to=(document.getElementById('trade-to').value||'').trim();

  for(const t of offerThemes){if(!(UC.themes||[]).includes(t)){showToast(`You don't own ${THEME_NAMES[t]||t}!`);return;}}

async function acceptTrade(id){
  if(!UC||!FB_READY)return;
  const trade=tradeCache.find(t=>t.id===id);
  if(!trade||trade.status!=='pending')return;
  const sender=await dbGetUser(trade.from);
  const receiver=UC;
  if(!sender){showToast('Sender account not found.');return;}
  if((sender.coins||0)<trade.offerCoins){showToast(`${trade.from} no longer has enough coins!`);return;}
  if((receiver.coins||0)<trade.wantCoins){showToast("You don't have enough coins!");return;}
  for(const t of trade.offerThemes){if(!(sender.themes||[]).includes(t)){showToast(`${trade.from} no longer owns ${THEME_NAMES[t]||t}!`);return;}}
  for(const t of trade.wantThemes){if(!(receiver.themes||[]).includes(t)){showToast(`You no longer own ${THEME_NAMES[t]||t}!`);return;}}
  const senderNewCoins=(sender.coins||0)-trade.offerCoins+trade.wantCoins;
  const receiverNewCoins=(receiver.coins||0)+trade.offerCoins-trade.wantCoins;
  let senderThemes=[...(sender.themes||[])];
  let receiverThemes=[...(receiver.themes||[])];
  trade.offerThemes.forEach(t=>{senderThemes=senderThemes.filter(x=>x!==t);if(!receiverThemes.includes(t))receiverThemes.push(t);});
  trade.wantThemes.forEach(t=>{receiverThemes=receiverThemes.filter(x=>x!==t);if(!senderThemes.includes(t))senderThemes.push(t);});
  await dbUpdateUser(trade.from,{coins:senderNewCoins,themes:senderThemes});
  UC.coins=receiverNewCoins;UC.themes=receiverThemes;
  await dbUpdateUser(getU(),{coins:receiverNewCoins,themes:receiverThemes});
  await db.collection('trades').doc(id).update({status:'accepted'});
  refreshCoins();renderShop();
  showToast('Trade accepted! ✅');
}

function renderTrades(){
  const me=getU();
  const incoming=tradeCache.filter(t=>t.to===me);
  const outgoing=tradeCache.filter(t=>t.from===me);
  const inEl=document.getElementById('trade-incoming-list');
  const outEl=document.getElementById('trade-outgoing-list');
  const countEl=document.getElementById('trade-incoming-count');
  const pendingCount=incoming.filter(t=>t.status==='pending').length;
  if(countEl)countEl.textContent=pendingCount>0?`(${pendingCount} pending)`:'';
  if(inEl)inEl.innerHTML=incoming.length?incoming.map(t=>renderTradeItem(t,true)).join(''):'<div class="empty">No incoming trades.</div>';
  if(outEl)outEl.innerHTML=outgoing.length?outgoing.map(t=>renderTradeItem(t,false)).join(''):'<div class="empty">No sent trades.</div>';
}

function renderTradeItem(t,isIncoming){
  const gives=[];const gets=[];
  if(isIncoming){
    if(t.offerCoins>0)gives.push(`🪙 ${t.offerCoins} coins`);
    t.offerThemes.forEach(x=>gives.push(`🎨 ${THEME_NAMES[x]||x}`));
    if(t.wantCoins>0)gets.push(`🪙 ${t.wantCoins} coins`);
    t.wantThemes.forEach(x=>gets.push(`🎨 ${THEME_NAMES[x]||x}`));
  } else {
    if(t.offerCoins>0)gives.push(`🪙 ${t.offerCoins} coins`);
    t.offerThemes.forEach(x=>gives.push(`🎨 ${THEME_NAMES[x]||x}`));
    if(t.wantCoins>0)gets.push(`🪙 ${t.wantCoins} coins`);
    t.wantThemes.forEach(x=>gets.push(`🎨 ${THEME_NAMES[x]||x}`));
  }
  const time=new Date(t.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let actions='';
  if(t.status==='pending'&&isIncoming){actions=`<div class="trade-actions"><button class="btn-accept" onclick="acceptTrade('${t.id}')">✅ Accept</button><button class="btn-decline" onclick="declineTrade('${t.id}')">❌ Decline</button></div>`;}
  else if(t.status==='pending'&&!isIncoming){actions=`<div class="trade-actions"><button class="btn-cancel-trade" onclick="cancelTrade('${t.id}')">Cancel</button></div>`;}
  return `<div class="trade-item ${isIncoming?'incoming':'outgoing'} ${t.status!=='pending'?'done':''}">
    <div class="trade-item-header">
      <span class="trade-from">${isIncoming?'From: '+esc(t.from):'To: '+esc(t.to)}</span>
      <span class="trade-status-badge ${t.status}">${t.status}</span>
    </div>
    <div class="trade-details">
      <b>They give:</b> ${gives.length?gives.join(', '):'nothing'}<br>
      <b>You give:</b> ${gets.length?gets.join(', '):'nothing'}<br>
      <span style="font-size:.72rem">${time}</span>
    </div>
    ${actions}
  </div>`;
}


const RAGE_MESSAGES=['DePoule is FURIOUS 😡','IT BURNS 🔥','RUN. 💀','THE ENTITY RAGES','PAIN IS COMING'];
const WIN_MESSAGES=['Nice pet 😌','It approves…','Lucky…','It liked that','Blessed 🍀','DePoule purrs…','Combo! ⚡'];
const LOSE_MESSAGES=['It bit you 😡','OUCH 💀','DePoule attacks!','Bad timing!','It feeds on you','PUNISHED','You fool 💀'];
function initPetBtn(){petState.rageMode=false;schedulePetFlip();}
function getFlipDelay(){return petState.rageMode?200+Math.random()*600:600+Math.random()*2400;}
function schedulePetFlip(){
  if(petState.timer)clearTimeout(petState.timer);
  petState.timer=setTimeout(()=>{
    const isRed=petState.rageMode?Math.random()<0.75:Math.random()<0.5;
    petState.color=isRed?'red':'green';
    const btn=document.getElementById('pet-btn');
    if(!btn){schedulePetFlip();return;}
    btn.className='pet-btn '+petState.color+(petState.rageMode?' rage-mode':'');
    btn.textContent=petState.color==='green'?'🐾 PET':'⚠ PET';
    const hint=document.getElementById('pet-hint');
    if(hint){
      if(petState.rageMode){hint.className='pet-hint bad';hint.textContent='RAGE MODE — 75% red!';}
      else{hint.className='pet-hint '+(petState.color==='green'?'good':'bad');hint.textContent=petState.color==='green'?'🟢 Green — pet now!':'🔴 Red — danger!';}
    }
    schedulePetFlip();
  },getFlipDelay());
}
async function petDePoule(){
  if(petState.cooldown||!UC)return;
  petState.cooldown=true;
  setTimeout(()=>petState.cooldown=false,120);
  const won=petState.color==='green';
  petState.pets++;
  if(won){
    petState.wins++;petState.combo++;
    const isJackpot=petState.combo>0&&petState.combo%10===0;
    const coinGain=isJackpot?10:petState.combo>=5?3:petState.combo>=3?2:1;
    petState.net+=coinGain;
    UC.coins=Math.max(0,(UC.coins||0)+coinGain);
    await dbUpdateUser(getU(),{coins:UC.coins});refreshCoins();
    const res=document.getElementById('pet-result');
    if(isJackpot){res.textContent='JACKPOT +'+coinGain+'🪙';res.className='pet-result jackpot';showToast('JACKPOT!! +'+coinGain+' coins! 🎰');}
    else{res.textContent='+'+(coinGain>1?coinGain+' 🪙':'1 🪙');res.className='pet-result win';}
    const hint=document.getElementById('pet-hint');
    if(hint){hint.className='pet-hint '+(isJackpot?'jackpot-hint':'good');hint.textContent=isJackpot?'JACKPOT!! 🎰':WIN_MESSAGES[Math.floor(Math.random()*WIN_MESSAGES.length)]+(petState.combo>1?' (x'+petState.combo+'!)':'');}
    petState.rageMode=false;document.getElementById('dp-skull').classList.remove('rage');
  } else {
    petState.losses++;petState.combo=0;
    const bigLoss=petState.losses%5===0;
    const coinLoss=bigLoss?5:1;
    petState.net-=coinLoss;
    UC.coins=Math.max(0,(UC.coins||0)-coinLoss);
    await dbUpdateUser(getU(),{coins:UC.coins});refreshCoins();
    const res=document.getElementById('pet-result');
    res.textContent=bigLoss?'PUNISHED −'+coinLoss+'🪙':'−1 🪙';res.className='pet-result lose';
    const hint=document.getElementById('pet-hint');
    if(hint){hint.className='pet-hint bad';hint.textContent=LOSE_MESSAGES[Math.floor(Math.random()*LOSE_MESSAGES.length)];}
    shakePanel();
    if(bigLoss){
      document.getElementById('dp-skull').classList.add('rage');
      petState.rageMode=true;
      if(document.getElementById('dp-mood'))document.getElementById('dp-mood').textContent=RAGE_MESSAGES[Math.floor(Math.random()*RAGE_MESSAGES.length)];
      showToast('DePoule ENTERS RAGE MODE! 😡🔥');
      clearTimeout(petState.timer);schedulePetFlip();
      setTimeout(()=>{petState.rageMode=false;document.getElementById('dp-skull').classList.remove('rage');const btn=document.getElementById('pet-btn');if(btn)btn.classList.remove('rage-mode');if(document.getElementById('dp-mood'))document.getElementById('dp-mood').textContent=getMoodText();},8000);
    }
  }
  updatePetUI();
  setTimeout(()=>{const res=document.getElementById('pet-result');if(res)res.textContent='';if(!petState.rageMode){const hint=document.getElementById('pet-hint');if(hint){hint.className='pet-hint neutral';hint.textContent='Pet DePoule… if you dare';}}},1400);
}
function shakePanel(){const p=document.getElementById('depoule-panel');if(!p)return;p.classList.remove('shaking');void p.offsetWidth;p.classList.add('shaking');setTimeout(()=>p.classList.remove('shaking'),450);}
function getMoodText(){if(petState.pets===0)return 'Dormant…';const r=petState.wins/petState.pets;if(r>0.7)return 'Content 😌';if(r>0.5)return 'Neutral…';if(r>0.3)return 'Irritated 😤';return 'Hostile 😡';}
function updatePetUI(){
  document.getElementById('dp-wins').textContent=petState.wins;
  document.getElementById('dp-losses').textContent=petState.losses;
  document.getElementById('dp-pets').textContent=petState.pets;
  const net=petState.net;document.getElementById('dp-pet-net').textContent=(net>=0?'+':'')+net;
  const cb=document.getElementById('combo-bar');const cl=document.getElementById('combo-label');
  if(cb)cb.style.width=Math.min(100,(petState.combo/10)*100)+'%';
  if(cl)cl.textContent=petState.combo>0?'Combo: '+petState.combo+'x — '+(petState.combo>=10?'JACKPOT READY 🎰':petState.combo>=5?'+3 per pet':petState.combo>=3?'+2 per pet':'+1 per pet'):'Combo: 0x';
  if(!petState.rageMode&&document.getElementById('dp-mood'))document.getElementById('dp-mood').textContent=getMoodText();
}

// ── TOAST ────────────────────────────────────────────────
let tTimer=null;
function showToast(msg){let t=document.querySelector('.toast');if(t)t.remove();t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);if(tTimer)clearTimeout(tTimer);tTimer=setTimeout(()=>t&&t.remove(),2800);}

// modal overlay close
document.getElementById('prof-overlay').addEventListener('click',function(e){if(e.target===this)closeProfile()});
document.getElementById('adm-overlay').addEventListener('click',function(e){if(e.target===this)closeAdmin()});
document.getElementById('dp-overlay').addEventListener('click',function(e){if(e.target===this)closeDP()});

// cleanup on page leave
window.addEventListener('beforeunload',()=>{if(liveRS.lobbyId&&liveRS.role==='host'&&liveRS.searching){try{db.collection('lobbies').doc(liveRS.lobbyId).delete();}catch(e){}}});

// ── INIT ─────────────────────────────────────────────────
async function init() {
  initFB();
  gmPreview();
  const cur=getU();
  if(cur){
    const acc=await dbGetUser(cur);
    if(acc){UC={...acc};document.getElementById('loading').style.display='none';enterApp();return;}
    else setU(null);
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='flex';
}
init();
</script>
