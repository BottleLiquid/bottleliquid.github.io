<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LiquidType — Gamble</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ── same theme vars as liquidtype2 ── */
:root{--bg1:#000;--bg2:#0d0000;--bg3:#1a0000;--accent:#e60000;--accent2:#ff3333;--card:rgba(30,0,0,.75);--cb:rgba(200,0,0,.25);--text:#f5f5f5;--muted:rgba(255,255,255,.4);--glow:0 0 16px rgba(200,0,0,.5);--ok:#00e676;--bad:#ff1744;--inp:rgba(0,0,0,.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;padding:0 16px 40px}

/* nav bar */
.topbar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:10px;border-bottom:1px solid #330000}
.tlogo{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:2px;color:#cc0000;text-decoration:none}
.tlogo span{color:#fff;font-size:1rem;letter-spacing:1px;margin-left:6px;opacity:.5}
.tnav{display:flex;align-items:center;gap:10px}
.tlink{padding:5px 12px;border-radius:4px;border:1px solid #440000;background:transparent;color:#888;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:.15s}
.tlink:hover{border-color:#cc0000;color:#ff4444}
.tlink.active{background:#cc0000;border-color:#cc0000;color:#fff}
.coin-bar{display:flex;align-items:center;gap:5px;border:1px solid #443300;border-radius:4px;padding:4px 10px;font-weight:700;font-size:.9rem;color:#ffd700}

/* not logged in */
#not-logged{display:none;text-align:center;margin-top:80px}
#not-logged p{color:var(--muted);margin-bottom:16px;font-size:1.1rem}
.go-btn{padding:12px 28px;background:#cc0000;border:none;border-radius:6px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
.go-btn:hover{background:#dd0000}

/* main card */
.gcard{width:100%;max-width:600px;background:var(--card);border:1px solid var(--cb);border-radius:16px;padding:32px;margin-top:24px;box-shadow:0 0 40px rgba(200,0,0,.2)}
.gtitle{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:4px;text-align:center;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.3);margin-bottom:4px}
.gsub{text-align:center;color:var(--muted);font-size:.85rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}

/* coin display */
.bal-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.bal-label{color:var(--muted);font-size:.9rem;letter-spacing:1px}
.bal-amount{font-family:'Bebas Neue',cursive;font-size:2.2rem;color:#ffd700;letter-spacing:2px}

/* bet input */
.bet-section{margin-bottom:24px}
.bet-label{font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.bet-row{display:flex;gap:8px;align-items:center}
.bet-input{flex:1;padding:12px 16px;background:var(--inp);border:1px solid #440000;border-radius:8px;color:#ffd700;font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;outline:none;text-align:center}
.bet-input:focus{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.2)}
.bet-input:disabled{opacity:.4;cursor:not-allowed}
.quick-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.qbtn{padding:6px 12px;border-radius:6px;border:1px solid #443300;background:transparent;color:#cc9900;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
.qbtn:hover{background:rgba(255,200,0,.1);border-color:#ffd700}
.qbtn:disabled{opacity:.3;cursor:not-allowed}

/* flip button */
.flip-btn{width:100%;padding:16px;border:none;border-radius:10px;background:linear-gradient(135deg,#cc7700,#ff9900);color:#000;font-family:'Bebas Neue',cursive;font-size:1.8rem;letter-spacing:3px;cursor:pointer;transition:.2s;box-shadow:0 0 20px rgba(255,150,0,.3);margin-bottom:20px}
.flip-btn:hover:not(:disabled){background:linear-gradient(135deg,#dd8800,#ffaa00);box-shadow:0 0 30px rgba(255,150,0,.5);transform:translateY(-1px)}
.flip-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* coin flip animation */
.coin-wrap{display:flex;justify-content:center;margin-bottom:20px;height:100px;align-items:center}
.coin{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;border:3px solid #ffd700;background:radial-gradient(circle,#332200,#1a1000);box-shadow:0 0 20px rgba(255,215,0,.3);transition:transform .1s;position:relative;overflow:hidden}
.coin.flipping{animation:coinFlip .8s ease-in-out}
@keyframes coinFlip{
  0%{transform:rotateY(0deg) scale(1)}
  25%{transform:rotateY(90deg) scale(1.1)}
  50%{transform:rotateY(180deg) scale(1)}
  75%{transform:rotateY(270deg) scale(1.1)}
  100%{transform:rotateY(360deg) scale(1)}
}
.coin.won{border-color:#00e676;box-shadow:0 0 30px rgba(0,230,118,.5);background:radial-gradient(circle,#003300,#001a00)}
.coin.lost{border-color:#ff1744;box-shadow:0 0 30px rgba(255,23,68,.5);background:radial-gradient(circle,#330000,#1a0000)}

/* result */
.result-area{text-align:center;min-height:60px;margin-bottom:8px}
.result-txt{font-family:'Bebas Neue',cursive;font-size:2.5rem;letter-spacing:3px}
.result-txt.win{color:var(--ok);text-shadow:0 0 20px rgba(0,230,118,.5)}
.result-txt.lose{color:var(--bad);text-shadow:0 0 20px rgba(255,23,68,.5)}
.result-sub{font-size:1rem;color:var(--muted);letter-spacing:1px;margin-top:4px}

/* stats row */
.stats-row{display:flex;gap:12px;margin-top:20px}
.stat-box{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;text-align:center}
.stat-lbl{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-val{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:1px}
.stat-val.green{color:var(--ok)}.stat-val.red{color:var(--bad)}.stat-val.gold{color:#ffd700}

/* history */
.hist-title{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:2px;color:var(--muted);margin:24px 0 10px;text-align:center}
.hist-list{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:4px}.hist-list::-webkit-scrollbar-thumb{background:rgba(200,0,0,.3);border-radius:2px}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;font-size:.88rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.hist-item.w{border-left:3px solid var(--ok)}.hist-item.l{border-left:3px solid var(--bad)}
.hist-bet{color:var(--muted)}.hist-result{font-weight:700}
.hist-result.w{color:var(--ok)}.hist-result.l{color:var(--bad)}

/* loading overlay */
#page-loading{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999}
.ld-logo{font-family:'Bebas Neue',cursive;font-size:2.8rem;letter-spacing:3px;color:#cc0000}
.ld-dots{display:flex;gap:6px}
.ld-dot{width:8px;height:8px;border-radius:50%;background:#cc0000;animation:db 1s infinite}
.ld-dot:nth-child(2){animation-delay:.15s}.ld-dot:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{opacity:.2}40%{opacity:1}}

.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:rgba(15,0,0,.97);border:1px solid var(--accent);border-radius:9px;padding:12px 18px;font-weight:600;font-size:.88rem;letter-spacing:1px;box-shadow:var(--glow);animation:tin .3s ease;pointer-events:none}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="page-loading">
  <div class="ld-logo">LiquidType</div>
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
</div>

<div class="topbar">
  <a class="tlogo" href="index.html">LiquidType <span>← Back to Game</span></a>
  <div class="tnav">
    <div class="coin-bar">🪙 <span id="nav-coins">0</span></div>
    <span id="nav-user" style="color:var(--muted);font-size:.85rem;font-weight:600"></span>
    <button class="tlink" onclick="doLogout()">Logout</button>
  </div>
</div>

<div id="not-logged">
  <p>You need to be logged in to gamble.</p>
  <a class="go-btn" href="index.html">Go to LiquidType →</a>
</div>

<div id="gamble-ui" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center">
  <div class="gcard">
    <div class="gtitle">🎰 Coin Flip</div>
    <div class="gsub">50 / 50 · Double or Nothing</div>

    <div class="bal-row">
      <span class="bal-label">Your Balance</span>
      <span class="bal-amount">🪙 <span id="g-coins">0</span></span>
    </div>

    <!-- Coin visual -->
    <div class="coin-wrap">
      <div class="coin" id="coin">🪙</div>
    </div>

    <!-- Result -->
    <div class="result-area" id="result-area"></div>

    <!-- Bet input -->
    <div class="bet-section">
      <span class="bet-label">Bet Amount</span>
      <div class="bet-row">
        <input class="bet-input" id="bet-input" type="number" min="1" max="999999" placeholder="0" value="10">
      </div>
      <div class="quick-btns">
        <button class="qbtn" id="qb-10" onclick="setBet(10)">10</button>
        <button class="qbtn" id="qb-25" onclick="setBet(25)">25</button>
        <button class="qbtn" id="qb-50" onclick="setBet(50)">50</button>
        <button class="qbtn" id="qb-100" onclick="setBet(100)">100</button>
        <button class="qbtn" id="qb-half" onclick="setBetHalf()">Half</button>
        <button class="qbtn" id="qb-all" onclick="setBetAll()">All In</button>
      </div>
    </div>

    <!-- Flip button -->
    <button class="flip-btn" id="flip-btn" onclick="doFlip()">🪙 FLIP</button>

    <!-- Session stats -->
    <div class="stats-row">
      <div class="stat-box"><div class="stat-lbl">Flips</div><div class="stat-val gold" id="st-flips">0</div></div>
      <div class="stat-box"><div class="stat-lbl">Wins</div><div class="stat-val green" id="st-wins">0</div></div>
      <div class="stat-box"><div class="stat-lbl">Losses</div><div class="stat-val red" id="st-losses">0</div></div>
      <div class="stat-box"><div class="stat-lbl">Net</div><div class="stat-val gold" id="st-net">0</div></div>
    </div>

    <!-- History -->
    <div class="hist-title">Recent Flips</div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>

<script>
// ── SAME FIREBASE CONFIG AS liquidtype2.html ──────────
const FB = {
  apiKey:            "AIzaSyBgppLaWv-3M9IsCzUtDD5Z8pqUxPtdPLk",
  authDomain:        "liquidtipe.firebaseapp.com",
  projectId:         "liquidtipe",
  storageBucket:     "liquidtipe.firebasestorage.app",
  messagingSenderId: "765092878295",
  appId:             "1:765092878295:web:e63bf4df58cee3141d5d92"
};

let db;
firebase.initializeApp(FB);
db = firebase.firestore();

// ── SESSION ───────────────────────────────────────────
function getU(){ return localStorage.getItem('lt_u') || null; }
function setU(u){ u ? localStorage.setItem('lt_u',u) : localStorage.removeItem('lt_u'); }
let UC = null;

async function loadUser() {
  const u = getU();
  if (!u) return false;
  const doc = await db.collection('users').doc(u).get();
  if (!doc.exists) { setU(null); return false; }
  UC = doc.data();
  return true;
}

async function saveCoins(newCoins) {
  UC.coins = newCoins;
  await db.collection('users').doc(getU()).update({ coins: newCoins });
  refreshCoins();
}

function refreshCoins() {
  const c = UC ? (UC.coins || 0) : 0;
  document.getElementById('g-coins').textContent = c;
  document.getElementById('nav-coins').textContent = c;
}

function doLogout() {
  setU(null); UC = null;
  window.location.href = 'index.html';
}

// ── SESSION STATS ─────────────────────────────────────
let stats = { flips: 0, wins: 0, losses: 0, net: 0 };
let history = [];

function updateStats() {
  document.getElementById('st-flips').textContent = stats.flips;
  document.getElementById('st-wins').textContent = stats.wins;
  document.getElementById('st-losses').textContent = stats.losses;
  const net = stats.net;
  const el = document.getElementById('st-net');
  el.textContent = (net >= 0 ? '+' : '') + net;
  el.className = 'stat-val ' + (net > 0 ? 'green' : net < 0 ? 'red' : 'gold');
}

function addHistory(bet, won) {
  history.unshift({ bet, won });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('hist-list');
  if (!history.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:16px;font-size:.85rem">No flips yet</div>'; return; }
  el.innerHTML = history.map(h => `
    <div class="hist-item ${h.won ? 'w' : 'l'}">
      <span class="hist-bet">Bet: 🪙 ${h.bet}</span>
      <span class="hist-result ${h.won ? 'w' : 'l'}">${h.won ? '+' + h.bet + ' 🎉' : '-' + h.bet + ' 💀'}</span>
    </div>
  `).join('');
}

// ── BET HELPERS ───────────────────────────────────────
function setBet(n) {
  const max = UC ? (UC.coins || 0) : 0;
  document.getElementById('bet-input').value = Math.min(n, max);
}
function setBetHalf() {
  const max = UC ? (UC.coins || 0) : 0;
  document.getElementById('bet-input').value = Math.max(1, Math.floor(max / 2));
}
function setBetAll() {
  const max = UC ? (UC.coins || 0) : 0;
  document.getElementById('bet-input').value = Math.max(1, max);
}

// ── FLIP LOGIC ────────────────────────────────────────
let isFlipping = false;

async function doFlip() {
  if (isFlipping || !UC) return;

  const bet = parseInt(document.getElementById('bet-input').value) || 0;
  const balance = UC.coins || 0;

  if (bet <= 0) { showToast('Enter a bet amount!'); return; }
  if (bet > balance) { showToast('Not enough coins!'); return; }

  isFlipping = true;
  setButtonsDisabled(true);

  // Clear result
  document.getElementById('result-area').innerHTML = '';
  const coinEl = document.getElementById('coin');
  coinEl.className = 'coin';
  coinEl.textContent = '🪙';

  // Flip animation
  coinEl.classList.add('flipping');

  // Decide outcome (true = win)
  const won = Math.random() < 0.5;

  await new Promise(r => setTimeout(r, 850)); // wait for animation

  coinEl.classList.remove('flipping');
  coinEl.classList.add(won ? 'won' : 'lost');
  coinEl.textContent = won ? '✅' : '❌';

  // Update coins
  const newCoins = won ? balance + bet : balance - bet;
  await saveCoins(newCoins);

  // Update stats
  stats.flips++;
  if (won) { stats.wins++; stats.net += bet; }
  else { stats.losses++; stats.net -= bet; }
  updateStats();
  addHistory(bet, won);

  // Show result
  const resEl = document.getElementById('result-area');
  if (won) {
    resEl.innerHTML = `<div class="result-txt win">YOU WON!</div><div class="result-sub">+${bet} coins 🎉</div>`;
  } else {
    resEl.innerHTML = `<div class="result-txt lose">YOU LOST</div><div class="result-sub">-${bet} coins 💀</div>`;
  }

  // Reset after 1.5s
  setTimeout(() => {
    isFlipping = false;
    setButtonsDisabled(false);
    // If broke, reset bet to 1
    if ((UC.coins || 0) <= 0) {
      showToast('You\'re broke! 😬 Go win some races.');
      document.getElementById('bet-input').value = 0;
    }
  }, 1500);
}

function setButtonsDisabled(d) {
  document.getElementById('flip-btn').disabled = d;
  document.getElementById('bet-input').disabled = d;
  document.querySelectorAll('.qbtn').forEach(b => b.disabled = d);
}

// ── TOAST ─────────────────────────────────────────────
let tTimer = null;
function showToast(msg) {
  let t = document.querySelector('.toast'); if(t) t.remove();
  t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  if(tTimer) clearTimeout(tTimer);
  tTimer = setTimeout(() => t && t.remove(), 2800);
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  const ok = await loadUser();
  document.getElementById('page-loading').style.display = 'none';

  if (!ok) {
    document.getElementById('not-logged').style.display = 'block';
    document.getElementById('gamble-ui').style.display = 'none';
    return;
  }

  document.getElementById('gamble-ui').style.display = 'flex';
  document.getElementById('not-logged').style.display = 'none';
  document.getElementById('nav-user').textContent = UC.username;
  refreshCoins();
  renderHistory();
  updateStats();
}

init();
</script>
</body>
</html>
