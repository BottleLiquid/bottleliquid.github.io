<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THUMPNAIL</title>
    <style>
        :root {
            --red: #ff1111;
            --dark-red: #550000;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --bg: #000000;
            --font-stack: 'Arial Black', 'Helvetica Neue', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: var(--font-stack);
            color: var(--red);
        }
   
        .screen-cracks {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50; /* Above text */
            opacity: 0.9;
        }

       
        .crack-layer {
            position: absolute;
            width: 100%; height: 100%;
            background-image:
               
                linear-gradient(135deg, transparent 50%, #fff 50%, transparent 51%),
                linear-gradient(135deg, transparent 48%, #444 48%, transparent 53%),
                
                linear-gradient(45deg, transparent 20%, #fff 20%, transparent 21%),
                linear-gradient(45deg, transparent 18%, #444 18%, transparent 23%),
               
                linear-gradient(170deg, transparent 70%, #fff 70%, transparent 71%),
                linear-gradient(170deg, transparent 68%, #444 68%, transparent 73%),
              
                radial-gradient(circle at 70% 30%, transparent 2px, #fff 2px, transparent 3px),
                radial-gradient(circle at 70% 30%, transparent 10px, #fff 10px, transparent 11px),
                linear-gradient(0deg, transparent 30%, #fff 31%, transparent 32%),
                linear-gradient(90deg, transparent 70%, #fff 71%, transparent 72%);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

       
        .crack-layer::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(100deg, transparent 40%, #fff 40%, transparent 41%),
                linear-gradient(10deg, transparent 60%, #fff 60%, transparent 61%),
                linear-gradient(-110deg, transparent 10%, #fff 10%, transparent 11%);
            opacity: 0.7;
        }

       
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGDAAnv37sXmBlAYAAscBwXidmUDAAAAAElFTkSuQmCC');
            opacity: 0.15;
            pointer-events: none;
            z-index: 10;
        }

        
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(100, 0, 0, 0.4) 100%);
            box-shadow: inset 0 0 100px rgba(0, 255, 255, 0.1), inset 0 0 200px rgba(255, 0, 255, 0.1);
            pointer-events: none;
            z-index: 40; 
        }


     

        .container {
            position: relative;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5));
          
            animation: impact 0.3s ease-out forwards;
        }

        .glitch-text {
            color: var(--red);
            font-size: clamp(3rem, 10vw, 9rem);
            letter-spacing: 1.2rem;
            position: relative;
            text-transform: uppercase;

            text-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            
            
            animation: shake 0.1s infinite;
        }


        .glitch-text::before, 
        .glitch-text::after,
        .layer-3,
        .layer-4 {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 1;
        }

      
        .glitch-text::before {
            color: var(--cyan);
            z-index: -1;
            animation: glitch-slice 0.15s infinite linear alternate-reverse;
        }

      
        .glitch-text::after {
            color: var(--magenta);
            z-index: -2;
            animation: glitch-slice-2 0.2s infinite linear alternate;
        }

       
        .layer-3 {
            color: var(--red);
            z-index: -3;
            animation: glitch-jump 3s infinite linear;
            clip-path: inset(0 0 90% 0);
        }

     
        .layer-4 {
            color: #ffffff;
            z-index: -4;
            opacity: 0.3;
            animation: glitch-flash 4s infinite linear;
        }


      

        
        @keyframes impact {
            0% { transform: scale(10); filter: blur(50px); opacity: 0; }
            100% { transform: scale(1); filter: blur(0px); opacity: 1; }
        }

       
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(1deg); }
            40% { transform: translate(-3px, 0px) rotate(-1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

       
        @keyframes glitch-slice {
            0% { clip-path: inset(5% 0 85% 0); transform: translate(-20px, -10px); }
            10% { clip-path: inset(80% 0 5% 0); transform: translate(20px, 10px); }
            20% { clip-path: inset(40% 0 50% 0); transform: translate(-15px, 5px); }
            30% { clip-path: inset(10% 0 80% 0); transform: translate(15px, -5px); }
            40% { clip-path: inset(60% 0 20% 0); transform: translate(-10px, 15px); }
            50% { clip-path: inset(20% 0 70% 0); transform: translate(10px, -15px); }
            60% { clip-path: inset(70% 0 10% 0); transform: translate(-5px, 20px); }
            70% { clip-path: inset(15% 0 75% 0); transform: translate(5px, -20px); }
            80% { clip-path: inset(30% 0 60% 0); transform: translate(-20px, 10px); }
            90% { clip-path: inset(90% 0 1% 0); transform: translate(20px, -10px); }
            100% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
        }

        @keyframes glitch-slice-2 {
            0% { clip-path: inset(90% 0 1% 0); transform: translate(25px, -15px); }
            10% { clip-path: inset(30% 0 60% 0); transform: translate(-25px, 15px); }
            20% { clip-path: inset(15% 0 75% 0); transform: translate(20px, -10px); }
            30% { clip-path: inset(70% 0 10% 0); transform: translate(-20px, 10px); }
            40% { clip-path: inset(20% 0 70% 0); transform: translate(15px, -20px); }
            50% { clip-path: inset(60% 0 20% 0); transform: translate(-15px, 20px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translate(10px, -15px); }
            70% { clip-path: inset(40% 0 50% 0); transform: translate(-10px, 15px); }
            80% { clip-path: inset(80% 0 5% 0); transform: translate(25px, -10px); }
            90% { clip-path: inset(5% 0 85% 0); transform: translate(-25px, 10px); }
            100% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
        }

       
        @keyframes glitch-jump {
            0% { opacity: 0; transform: translate(0, 0); }
            1% { opacity: 1; transform: translate(-50px, -10px); clip-path: inset(0 0 95% 0); }
            2% { opacity: 1; transform: translate(50px, 10px); clip-path: inset(95% 0 0 0); }
            3% { opacity: 0; transform: translate(0, 0); }
            98% { opacity: 0; }
            99% { opacity: 1; transform: translate(100px, 30px); clip-path: inset(0 0 0 0); filter: blur(5px); }
            100% { opacity: 0; transform: translate(0, 0); }
        }

        
        @keyframes glitch-flash {
            0% { opacity: 0; }
            2% { opacity: 0.8; filter: blur(5px); }
            3% { opacity: 0; }
            40% { opacity: 0; }
            41% { opacity: 0.5; transform: scaleY(1.5); }
            42% { opacity: 0; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="vignette"></div>
    <div class="screen-cracks">
        <div class="crack-layer"></div>
    </div>

    <div class="container">
        <h1 class="glitch-text" data-text="liquidtype">
            liquidtype
            <span class="layer-3" data-text="liquidtype"></span>
            <span class="layer-4" data-text="liquidtype"></span>
        </h1>
    </div>

</body>
</html>
